services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: talentrank
      POSTGRES_USER: talentrank
      POSTGRES_PASSWORD: talentrank_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentrank -d talentrank"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://talentrank:talentrank_dev_password@db:5432/talentrank
      TALENTRANK_USE_PRISMA: "true"
      TALENTRANK_RUN_MIGRATIONS: "true"
      TALENTRANK_AUTH_SECRET: docker-dev-auth-secret-change-me
      TALENTRANK_BOOTSTRAP_EMAIL: admin@talentrank.local
      TALENTRANK_BOOTSTRAP_PASSWORD: talentrank-admin
      TALENTRANK_STORAGE_KEY: docker-dev-storage-secret-change-me
      TALENTRANK_MALWARE_SCAN_URL: http://mock-integrations:3060/scan
      OCR_API_URL: http://mock-integrations:3060/ocr
      TALENTRANK_STORAGE_DOWNLOAD_URL: http://mock-integrations:3060/signed-download
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIMENSIONS: "256"
    ports:
      - "3000:3000"

  mock-integrations:
    image: node:22-bookworm-slim
    working_dir: /app
    command: ["node", "scripts/mock-integrations.mjs"]
    volumes:
      - .:/app
      - mock-object-storage:/app/.data/mock-object-storage
    ports:
      - "3060:3060"

volumes:
  postgres-data:
  mock-object-storage:
