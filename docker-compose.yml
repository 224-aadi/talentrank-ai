services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: talentrank
      POSTGRES_USER: talentrank
      POSTGRES_PASSWORD: talentrank_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentrank -d talentrank"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://talentrank:talentrank_dev_password@db:5432/talentrank
      TALENTRANK_USE_PRISMA: "true"
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIMENSIONS: "256"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
